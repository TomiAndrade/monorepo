services:
  db:
    image: postgres:16-alpine
    container_name: sima-training-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sima
      POSTGRES_PASSWORD: sima
      POSTGRES_DB: sima_training
    ports:
      - '5432:5432'
    volumes:
      - sima-training-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sima -d sima_training']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sima-training-pgdata:
